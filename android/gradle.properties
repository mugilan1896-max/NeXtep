org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disable incremental compilation for sign_in_with_apple plugin
kotlin.incremental.usePreciseJavaTracking=false
# Disable Kotlin incremental compilation to avoid cache corruption
kotlin.incremental=false
# Enable native access for NDK linker on Windows
org.gradle.java.installations.auto-detect=false
# Fix possible NDK linker issues
android.enableSeparateApkResources=true
# Disable D8 incremental compilation
android.enableDesugaringNestedLambdas=true
# Suppress Java 8 deprecation warnings
org.gradle.java.compile.source.version=11
org.gradle.java.compile.target.version=11
# Disable CMake verbose logging to avoid path issues
android.cmake.verbose=false
# Skip CMake configuration if not explicitly needed
android.enableCmakeLogging=false
